events {}

http {

    upstream auth_service {
        server auth-service:8000;
    }

    upstream customer_service {
        server customer-service:8000;
    }

    upstream order_service {
        server order-service:8000;
    }

    upstream invoice_service {
        server invoice-service:8000;
    }

    upstream payment_service {
        server payment-service:8000;
    }

    upstream frontend_service {
        server frontend:3000;
    }

    server {
        listen 80;

        client_max_body_size 10M;

        # headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # ==================================================
        # GLOBAL SWAGGER ROUTES (needed for Swagger UI)
        # ==================================================
        location = /openapi.json {
            proxy_pass http://auth_service/openapi.json;
        }

        location = /docs {
            proxy_pass http://auth_service/docs;
        }

        location = /redoc {
            proxy_pass http://auth_service/redoc;
        }

        # ==================================================
        # AUTH SERVICE DOCS
        # ==================================================
        location = /api/auth/docs {
            proxy_pass http://auth_service/docs;
        }

        location = /api/auth/redoc {
            proxy_pass http://auth_service/redoc;
        }

        location = /api/auth/openapi.json {
            proxy_pass http://auth_service/openapi.json;
        }

        # ==================================================
        # CUSTOMER SERVICE DOCS
        # ==================================================
        location = /api/customers/docs {
            proxy_pass http://customer_service/docs;
        }

        location = /api/customers/redoc {
            proxy_pass http://customer_service/redoc;
        }

        location = /api/customers/openapi.json {
            proxy_pass http://customer_service/openapi.json;
        }

        # ==================================================
        # ORDER SERVICE DOCS
        # ==================================================
        location = /api/orders/docs {
            proxy_pass http://order_service/docs;
        }

        location = /api/orders/redoc {
            proxy_pass http://order_service/redoc;
        }

        location = /api/orders/openapi.json {
            proxy_pass http://order_service/openapi.json;
        }

        # ==================================================
        # INVOICE SERVICE DOCS
        # ==================================================
        location = /api/invoices/docs {
            proxy_pass http://invoice_service/docs;
        }

        location = /api/invoices/redoc {
            proxy_pass http://invoice_service/redoc;
        }

        location = /api/invoices/openapi.json {
            proxy_pass http://invoice_service/openapi.json;
        }

        # ==================================================
        # PAYMENT SERVICE DOCS
        # ==================================================
        location = /api/payments/docs {
            proxy_pass http://payment_service/docs;
        }

        location = /api/payments/redoc {
            proxy_pass http://payment_service/redoc;
        }

        location = /api/payments/openapi.json {
            proxy_pass http://payment_service/openapi.json;
        }

        # ==================================================
        # AUTH SERVICE API
        # ==================================================
        location /api/auth/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://auth_service;
        }

        # ==================================================
        # CUSTOMER SERVICE API
        # ==================================================
        location /api/customers/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://customer_service;
        }

        # ==================================================
        # ORDER SERVICE API
        # ==================================================
        location /api/orders/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://order_service;
        }

        # ==================================================
        # INVOICE SERVICE API
        # ==================================================
        location /api/invoices/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://invoice_service;
        }

        # ==================================================
        # PAYMENT SERVICE API
        # ==================================================
        location /api/payments/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://payment_service;
        }

        # ==================================================
        # FRONTEND
        # ==================================================
        location / {
            proxy_pass http://frontend_service;
        }

    }
}